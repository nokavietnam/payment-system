spring:
  application:
    name: payment-service
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        register: true
        health-check-path: /actuator/health
        health-check-interval: 10s
server:
  port: 9001
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,prometheus
        exclude: loggers
  metrics:
    tags:
      application: payment-service
